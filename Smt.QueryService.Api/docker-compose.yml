version: "3.9"

services:

  smt-query-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smt-query
    ports:
      - "8080:8080"
    environment:
      - APP__SERVICENAME=smt-query-service
      - APP__ENVIRONMENTNAME=Development
      - APP__DEFAULTMETRICSINTERVALMINUTES=60
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  smt-iot-simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile.simulator
    container_name: smt-simulator
    depends_on:
      - smt-query-service
    environment:
      - QUERY_SERVICE_URL=http://smt-query-service:8080
      - SIMULATE_INTERVAL_SECONDS=10
      - LOCATIONS=loc-001,loc-002,loc-003
    restart: unless-stopped